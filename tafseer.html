<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>رحاب الايمان</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="color-gold">قائمة السور - تفسير ابن كثير</h2>
            <a href="index1.html" class="btn btn-outline-success">الرئيسية</a>
            <a href="index.html" class="btn btn-outline-success">رجوع</a>
        </div>

        <div class="row">
            <script>
                const soras = [
                    "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة",
                    "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
                    "هود", "يوسف", "الرعد", "إبراهيم", "الحجر",
                    "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء"
                ];

                let rowContent = "";
                soras.forEach((name, index) => {
                    rowContent += `
                <div class="col-md-4 mb-3">
                    <div class="card sora-card shadow-sm border-0">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center">
                                <span class="sora-num">${index + 1}</span>
                                <h6 class="mb-0 ms-3">${name}</h6>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-success done-sora-btn">
                                    <i class="fas fa-check"></i>
                                </button>
                                <a href="ibn-kathir-content.html" class="btn btn-sm btn-success">
                                    <i class="fas fa-book-open"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>`;
                });
                document.write(`<div class="row">${rowContent}</div>`);
            </script>
        </div>
    </div>

    <script>
        document.addEventListener('click', function (e) {
            if (e.target.closest('.done-sora-btn')) {
                const card = e.target.closest('.sora-card');
                card.classList.add('fade-out');
                setTimeout(() => {
                    card.style.display = 'none';
                }, 500);
            }
        });
    </script>
</body>

</html>
